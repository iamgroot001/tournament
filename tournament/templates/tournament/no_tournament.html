{% extends "tournament/base.html" %}

{% block title %}No Active Tournament{% endblock %}

{% block content %}
<section class="hero" style="text-align: center; padding: 6rem 2rem;">
    <div class="hero__content">
        <h1 style="font-size: 2.5rem; margin-bottom: 1rem;">🏏 No Active Tournament</h1>
        <p style="color: var(--text-muted); font-size: 1.1rem; max-width: 500px; margin: 0 auto 2rem;">
            There is no tournament currently active. Please ask the administrator to
            create a tournament and mark it as active.
        </p>
        <a href="/admin/" class="btn" style="display: inline-block; padding: 0.8rem 2rem; background: var(--accent-gradient);
                  color: #fff; border-radius: 8px; text-decoration: none; font-weight: 600;
                  transition: transform 0.2s;">
            Go to Admin Panel →
        </a>
    </div>
</section>
{% endblock %}
